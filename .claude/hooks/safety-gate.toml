# sipag safety-gate configuration
#
# Extra deny patterns and path deny lists loaded by safety-gate.sh.
# Patterns are extended regular expressions matched against the full command string.
#
# There is no [allow] section — the gate uses a deny-list-only model.
# Commands that don't match any deny pattern are allowed.

[deny]
patterns = [
    "my-dangerous-command",
]

[paths]
deny = [
    "/etc",
    "/usr",
    "/var/run",
]
